<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern AI Chess</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1c1e;
            --card-bg: #2d2f31;
            --accent-color: #d4ad7a;
            --text-color: #e2e2e2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; margin-top: 0; color: var(--accent-color); font-size: 1.5rem; }

        #myBoard { width: 100%; border-radius: 4px; }

        .status-container {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            text-align: center;
        }

        #status { font-weight: 600; font-size: 1rem; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: var(--accent-color);
            color: #2b1d0e;
            font-weight: 600;
            cursor: pointer;
        }

        button.secondary { background: #4a4d50; color: white; }
        
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        /* Simple toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4a4d50;
            transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wood & Slate Chess</h1>
        
        <div class="toggle-container">
            <span>2 Player</span>
            <label class="switch">
                <input type="checkbox" id="aiToggle">
                <span class="slider"></span>
            </label>
            <span>Play vs AI</span>
        </div>

        <div id="myBoard"></div>

        <div class="status-container">
            <div id="status">White to move</div>
        </div>

        <div class="controls">
            <button id="resetBtn" class="secondary">New Game</button>
            <button id="flipBtn" class="secondary">Flip Board</button>
        </div>
    </div>

    <script>
        let board = null;
        const game = new Chess();
        const $status = $('#status');
        let aiMode = false;

        // --- AI LOGIC (MINIMAX + ALPHA-BETA) ---

        const weights = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
        
        // Simple positional evaluation to make AI smarter (central control)
        const pst = [
            [0,  0,  0,  0,  0,  0,  0,  0],
            [5, 10, 10,-20,-20, 10, 10,  5],
            [5, -5,-10,  0,  0,-10, -5,  5],
            [0,  0,  0, 20, 20,  0,  0,  0],
            [5,  5, 10, 25, 25, 10,  5,  5],
            [10, 10, 20, 30, 30, 20, 10, 10],
            [50, 50, 50, 50, 50, 50, 50, 50],
            [0,  0,  0,  0,  0,  0,  0,  0]
        ];

        function evaluateBoard(game) {
            let totalEvaluation = 0;
            const board = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(board[i][j], i, j);
                }
            }
            return totalEvaluation;
        }

        function getPieceValue(piece, x, y) {
            if (piece === null) return 0;
            const getAbsoluteValue = (p, isWhite, x, y) => {
                if (p.type === 'p') return weights.p + (isWhite ? pst[x][y] : pst[7-x][y]);
                if (p.type === 'n') return weights.n;
                if (p.type === 'b') return weights.b;
                if (p.type === 'r') return weights.r;
                if (p.type === 'q') return weights.q;
                if (p.type === 'k') return weights.k;
                return 0;
            };
            const val = getAbsoluteValue(piece, piece.color === 'w', x, y);
            return piece.color === 'w' ? val : -val;
        }

        function minimax(game, depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0) return -evaluateBoard(game);

            const moves = game.moves();
            if (isMaximizingPlayer) {
                let bestEval = -9999;
                for (const move of moves) {
                    game.move(move);
                    bestEval = Math.max(bestEval, minimax(game, depth - 1, alpha, beta, !isMaximizingPlayer));
                    game.undo();
                    alpha = Math.max(alpha, bestEval);
                    if (beta <= alpha) return bestEval;
                }
                return bestEval;
            } else {
                let bestEval = 9999;
                for (const move of moves) {
                    game.move(move);
                    bestEval = Math.min(bestEval, minimax(game, depth - 1, alpha, beta, !isMaximizingPlayer));
                    game.undo();
                    beta = Math.min(beta, bestEval);
                    if (beta <= alpha) return bestEval;
                }
                return bestEval;
            }
        }

        function makeBestMove() {
            const moves = game.moves();
            if (moves.length === 0) return;

            let bestMove = null;
            let bestValue = -9999;

            for (const move of moves) {
                game.move(move);
                const boardValue = minimax(game, 2, -10000, 10000, false); // Depth 3 (2 recursions)
                game.undo();
                if (boardValue > bestValue) {
                    bestValue = boardValue;
                    bestMove = move;
                }
            }

            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        // --- BOARD EVENT HANDLERS ---

        function onDragStart(source, piece) {
            if (game.game_over()) return false;
            // Don't let user move for Black if AI is enabled
            if (aiMode && piece.search(/^b/) !== -1) return false;
            // Only move own color
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
        }

        function onDrop(source, target) {
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();

            // Trigger AI if it's Black's turn and AI mode is on
            if (aiMode && !game.game_over()) {
                window.setTimeout(makeBestMove, 250);
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            let status = '';
            let moveColor = game.turn() === 'b' ? 'Black' : 'White';

            if (game.in_checkmate()) status = `Checkmate! ${moveColor === 'White' ? 'Black' : 'White'} wins.`;
            else if (game.in_draw()) status = 'Game over, draw.';
            else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ' (In Check!)';
            }
            $status.html(status);
        }

        // --- INITIALIZATION ---

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('myBoard', config);

        $('#resetBtn').on('click', () => {
            game.reset();
            board.start();
            updateStatus();
        });

        $('#flipBtn').on('click', board.flip);

        $('#aiToggle').on('change', function() {
            aiMode = $(this).is(':checked');
            if (aiMode && game.turn() === 'b') makeBestMove();
        });

        $(window).resize(board.resize);
        updateStatus();
    </script>
</body>
</html>
